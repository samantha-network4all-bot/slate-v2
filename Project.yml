name: Slate
options:
  bundleIdPrefix: com.bimboware
  deploymentTarget:
    macOS: "13.0"
  architectures:
    - arm64
    - x86_64

targets:
  Slate:
    type: application
    platform: macOS
    sources:
      - Slate/main.swift
      - Slate/AppDelegate.swift
      - Slate/App/DocumentController.swift
      - Slate/Window/SlateWindow.swift
      - Slate/Window/SlateWindowController.swift
      - Slate/Window/TitleBarView.swift
      - Slate/Window/TitleBarButton.swift
      - Slate/Window/StatusBarView.swift
      - Slate/Editor/EditorView.swift
      - Slate/Theme/Colors.swift
      - Slate/Theme/Fonts.swift
      - Slate/Theme/Metrics.swift
      - Slate/TestAPI/TestAPIServer.swift
      - Slate/TestAPI/TestAPIRoutes.swift
    info:
      path: Slate/Info.plist
    settings:
      PRODUCT_NAME: Slate
      PRODUCT_BUNDLE_IDENTIFIER: com.bimboware.slate
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      ARCHS: "arm64 x86_64"
      INFOPLIST_FILE: Slate/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
