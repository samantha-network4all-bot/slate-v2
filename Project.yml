name: Slate
options:
  bundleIdPrefix: com.bimbowate
  deploymentTarget:
    macOS: "13.0"
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
targets:
  Slate:
    type: application
    platform: macOS
    scheme:
      gatherCoverageData: false
    sources:
      - path: Slate
    settings:
      base:
        PRODUCT_NAME: Slate
        PRODUCT_BUNDLE_IDENTIFIER: com.bimbowate.slate
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ARCHS: "arm64 x86_64"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: Slate/Info.plist
        CODE_SIGN_ENTITLEMENTS: ""
    info:
      path: Slate/Info.plist
      properties:
        CFBundleDisplayName: Slate
        CFBundleIdentifier: com.bimbowate.slate
        NSMainNibFile: ""
        NSPrincipalClass: NSApplication
        LSMinimumSystemVersion: "13.0"
        CFBundleDocumentTypes:
          - CFBundleTypeName: Plain Text
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            CFBundleTypeExtensions:
              - txt
            CFBundleTypeIconFile: ""
        CFBundleName: Slate
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
